# Pre-commit hooks for local security scanning
# Installation:
#   pip install pre-commit
#   pre-commit install
#
# Manual scan of all files:
#   pre-commit run --all-files

repos:
  # ── Standard file hygiene ───────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=5120']
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ['--branch', 'main']

  # ── Secret detection (Yelp detect-secrets) ──────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Scan for secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)
          ^\.secrets\.baseline$|
          ^audit-logs/

  # ── Secret scanning (Gitleaks – OSS, no license key required) ───────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: Detect hardcoded secrets with Gitleaks
