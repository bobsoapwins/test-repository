name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly on Saturday at 01:30 UTC
    - cron: "30 1 * * 6"
  push:
    branches:
      - main
  workflow_dispatch:

# Allow read access to all resources; write only for the jobs that need it.
permissions: read-all

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to upload SARIF results to the Security tab
      security-events: write
      # Required by ossf/scorecard-action to sign the results
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to the OpenSSF public dashboard (no API key needed)
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
