name: Access Monitor

# Alert immediately when collaborators, deploy keys, or protected branch settings
# are modified â€” any of these events could indicate unauthorized access escalation.
on:
  member:
    types:
      - added
      - removed
      - edited
  deploy_key:
    types:
      - created
      - deleted
  branch_protection_rule:
    types:
      - created
      - edited
      - deleted
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  alert:
    name: Alert on Access Change
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          # Use 'audit' to allow egress to configured email servers
          egress-policy: audit

      - name: Resolve event details
        id: details
        run: |
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"
          ACTOR="${{ github.actor }}"
          TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          echo "event=$EVENT"     >> "$GITHUB_OUTPUT"
          echo "action=$ACTION"   >> "$GITHUB_OUTPUT"
          echo "actor=$ACTOR"     >> "$GITHUB_OUTPUT"
          echo "ts=$TS"           >> "$GITHUB_OUTPUT"

          echo "Access change detected:"
          echo "  Event  : $EVENT"
          echo "  Action : $ACTION"
          echo "  Actor  : $ACTOR"
          echo "  Time   : $TS"

      - name: Create security alert issue
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const event  = `${{ steps.details.outputs.event }}`;
            const action = `${{ steps.details.outputs.action }}`;
            const actor  = `${{ steps.details.outputs.actor }}`;
            const ts     = `${{ steps.details.outputs.ts }}`;
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            const eventLabels = {
              member:                  ['access-change', 'collaborator', 'security'],
              deploy_key:              ['access-change', 'deploy-key',   'security'],
              branch_protection_rule:  ['access-change', 'branch-protection', 'security'],
            };
            const labels = eventLabels[event] || ['access-change', 'security'];

            const emojiMap = {
              added:   'âž•',
              removed: 'âž–',
              edited:  'âśŹď¸Ź',
              created: 'đź”‘',
              deleted: 'đź—‘ď¸Ź',
            };
            const emoji = emojiMap[action] || 'âš ď¸Ź';

            const body = [
              `## ${emoji} Access Change Detected`,
              ``,
              `| Field    | Value |`,
              `|----------|-------|`,
              `| **Event**  | \`${event}\` |`,
              `| **Action** | \`${action}\` |`,
              `| **Actor**  | @${actor} |`,
              `| **Time**   | ${ts} |`,
              `| **Run**    | [View workflow run](${runUrl}) |`,
              ``,
              `### Required Actions`,
              ``,
              `- [ ] Verify that @${actor} was authorized to make this change`,
              `- [ ] Review current collaborator list and access levels`,
              `- [ ] Review branch protection rules for tampering`,
              `- [ ] If unauthorized, immediately rotate credentials and initiate lockdown`,
              `- [ ] Document the change and its business justification`,
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `${emoji} [ACCESS] ${event}/${action} by @${actor} at ${ts}`,
              body,
              labels,
            });

            console.log(`Security alert issue created: ${issue.data.html_url}`);

      - name: Send email notification
        if: secrets.MAIL_SERVER != '' && secrets.MAIL_PORT != '' && secrets.MAIL_USERNAME != '' && secrets.MAIL_PASSWORD != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "âš ď¸Ź [ACCESS] ${{ steps.details.outputs.event }}/${{ steps.details.outputs.action }} in ${{ github.repository }}"
          to: northdunne@gmail.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Access Change Detected in ${{ github.repository }}

            Event  : ${{ steps.details.outputs.event }}
            Action : ${{ steps.details.outputs.action }}
            Actor  : @${{ steps.details.outputs.actor }}
            Time   : ${{ steps.details.outputs.ts }}
            Run    : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
