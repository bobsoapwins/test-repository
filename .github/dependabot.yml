version: 2
updates:
  # Monitor GitHub Actions for updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    reviewers:
      - "bobsoapwins"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10

  # Monitor pip / Python dependencies if any are added in future
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "UTC"
    reviewers:
      - "bobsoapwins"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  # Monitor npm / Node.js dependencies if any are added in future
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "UTC"
    reviewers:
      - "bobsoapwins"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
